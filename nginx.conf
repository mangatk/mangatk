events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    # Upstream Next.js frontend
    upstream nextjs {
        server frontend:3000;
    }

    # Upstream Django backend API
    upstream django {
        server backend:8000;
    }

    server {
        listen 80;
        server_name localhost; # Will be replaced by domain on VPS

        # Increase upload size for Manga chapters
        client_max_body_size 500M;

        # Route /api/ and /admin/ to Django backend
        location ~ ^/(api|admin) {
            proxy_pass http://django;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Django media files (if any are stored locally instead of Cloud)
        location /media/ {
            alias /app/media/;
        }

        # Django static files
        location /static/ {
            alias /app/static/;
        }

        # Route everything else to Next.js Frontend
        location / {
            proxy_pass http://nextjs;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
